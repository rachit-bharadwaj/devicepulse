<!-- Glassmorphic Background with Glow Blobs -->
<div class="relative min-h-screen flex items-center justify-center bg-zinc-950 overflow-hidden font-sans">
  
  <!-- Glowing Background Blobs -->
  <div class="absolute top-1/4 left-1/4 -translate-x-1/2 -translate-y-1/2 w-[350px] h-[350px] rounded-full bg-cyan-500/10 blur-[100px] animate-pulse-slow"></div>
  <div class="absolute bottom-1/4 right-1/4 translate-x-1/2 translate-y-1/2 w-[400px] h-[400px] rounded-full bg-emerald-500/10 blur-[120px] animate-pulse-slow delay-700"></div>
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] rounded-full bg-indigo-500/5 blur-[150px]"></div>

  <!-- Decorative Grid Overlay -->
  <div class="absolute inset-0 bg-[linear-gradient(to_right,#1f293708_1px,transparent_1px),linear-gradient(to_bottom,#1f293708_1px,transparent_1px)] bg-[size:24px_24px] pointer-events-none"></div>

  <!-- Main Card Container -->
  <div class="w-full max-w-md p-8 mx-4 rounded-2xl bg-zinc-900/40 border border-zinc-800/80 backdrop-blur-xl shadow-2xl relative z-10 transition-all duration-300">
    
    <!-- Logo & Title -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-zinc-950/60 border border-zinc-800/60 shadow-inner mb-4 relative group">
        <!-- Beating Pulse SVG Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" class="w-9 h-9 stroke-cyan-400 drop-shadow-[0_0_8px_rgba(34,211,238,0.5)] animate-heartbeat">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M3 12h1.5L8 4.5 12 19.5l4-11.25L19.5 15H21" />
        </svg>
        <span class="absolute -top-1 -right-1 flex h-3.5 w-3.5">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-3.5 w-3.5 bg-cyan-500"></span>
        </span>
      </div>
      <h1 class="text-2xl font-bold tracking-tight text-white">DEVICE PULSE</h1>
      <p class="text-zinc-400 text-xs mt-1 tracking-wider uppercase">Real-Time Diagnostics Monitor</p>
    </div>

    <!-- Toggle Tabs -->
    <div class="flex p-1 mb-8 rounded-lg bg-zinc-950/80 border border-zinc-800/50">
      <button 
        type="button"
        (click)="setMode('login')"
        [class]="mode() === 'login' ? 'bg-zinc-800/80 text-white shadow-sm' : 'text-zinc-400 hover:text-zinc-200'"
        class="flex-1 py-2 text-sm font-medium rounded-md transition-all duration-200 cursor-pointer">
        Login
      </button>
      <button 
        type="button"
        (click)="setMode('register')"
        [class]="mode() === 'register' ? 'bg-zinc-800/80 text-white shadow-sm' : 'text-zinc-400 hover:text-zinc-200'"
        class="flex-1 py-2 text-sm font-medium rounded-md transition-all duration-200 cursor-pointer">
        Register
      </button>
    </div>

    <!-- Auth Form -->
    <form (ngSubmit)="onSubmit()" #authForm="ngForm" class="space-y-6">
      
      <!-- Username Field -->
      <div>
        <label for="username" class="block text-xs font-semibold text-zinc-300 uppercase tracking-wider mb-2">Username</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
          </div>
          <input 
            type="text" 
            id="username" 
            name="username"
            [(ngModel)]="username"
            placeholder="Enter your username" 
            required
            class="block w-full pl-10 pr-4 py-3 bg-zinc-950/40 border border-zinc-800 rounded-xl text-white placeholder-zinc-500 focus:outline-none focus:ring-1 focus:ring-cyan-500 focus:border-cyan-500 focus:shadow-[0_0_15px_rgba(6,182,212,0.15)] transition-all duration-200 text-sm" />
        </div>
      </div>

      <!-- Email Field (Only in Register Mode) -->
      @if (mode() === 'register') {
        <div class="animate-fade-in">
          <label for="email" class="block text-xs font-semibold text-zinc-300 uppercase tracking-wider mb-2">Email Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
            </div>
            <input 
              type="email" 
              id="email" 
              name="email"
              [(ngModel)]="email"
              placeholder="you@example.com" 
              required
              class="block w-full pl-10 pr-4 py-3 bg-zinc-950/40 border border-zinc-800 rounded-xl text-white placeholder-zinc-500 focus:outline-none focus:ring-1 focus:ring-cyan-500 focus:border-cyan-500 focus:shadow-[0_0_15px_rgba(6,182,212,0.15)] transition-all duration-200 text-sm" />
          </div>
        </div>
      }

      <!-- Password Field -->
      <div>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
          </div>
          <input 
            [type]="showPassword() ? 'text' : 'password'" 
            id="password" 
            name="password"
            [(ngModel)]="password"
            placeholder="••••••••" 
            required
            class="block w-full pl-10 pr-10 py-3 bg-zinc-950/40 border border-zinc-800 rounded-xl text-white placeholder-zinc-500 focus:outline-none focus:ring-1 focus:ring-cyan-500 focus:border-cyan-500 focus:shadow-[0_0_15px_rgba(6,182,212,0.15)] transition-all duration-200 text-sm" />
          <button 
            type="button" 
            (click)="togglePasswordVisibility()"
            class="absolute inset-y-0 right-0 pr-3 flex items-center text-zinc-500 hover:text-zinc-300 cursor-pointer">
            @if (showPassword()) {
              <!-- Eye Off Icon -->
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
              </svg>
            } @else {
              <!-- Eye Icon -->
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
            }
          </button>
        </div>
      </div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        [disabled]="loading() || !authForm.form.valid"
        class="w-full py-3 px-4 rounded-xl text-white font-medium bg-gradient-to-r from-cyan-600 to-emerald-600 hover:from-cyan-500 hover:to-emerald-500 active:scale-[0.98] disabled:opacity-50 disabled:pointer-events-none disabled:transform-none shadow-lg shadow-cyan-950/20 hover:shadow-cyan-950/40 focus:outline-none transition-all duration-200 cursor-pointer flex justify-center items-center gap-2">
        
        @if (loading()) {
          <!-- Spinner -->
          <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Processing...
        } @else {
          {{ mode() === 'login' ? 'Login' : 'Create Account' }}
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
          </svg>
        }
      </button>

    </form>
  </div>
</div>

<!-- Beautiful Toast Notifications -->
@if (toast(); as t) {
  <div class="fixed bottom-6 right-6 z-50 animate-slide-up">
    <div 
      [class.bg-emerald-950/80]="t.type === 'success'"
      [class.border-emerald-500/50]="t.type === 'success'"
      [class.text-emerald-300]="t.type === 'success'"
      [class.bg-rose-950/80]="t.type === 'error'"
      [class.border-rose-500/50]="t.type === 'error'"
      [class.text-rose-300]="t.type === 'error'"
      [class.bg-zinc-900/90]="t.type === 'info'"
      [class.border-cyan-500/50]="t.type === 'info'"
      [class.text-cyan-300]="t.type === 'info'"
      class="flex items-center gap-3 px-5 py-4 border backdrop-blur-xl rounded-xl shadow-2xl transition-all duration-300">
      
      @if (t.type === 'success') {
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 stroke-emerald-400">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      } @else if (t.type === 'error') {
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 stroke-rose-400">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 stroke-cyan-400">
          <path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 111.083 1.083l-1.083 1.083A.75.75 0 0110.5 13.5v-2.25c0-.414.336-.75.75-.75zM12 7.5a.75.75 0 100-1.5.75.75 0 000 1.5zM21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      }
      <span class="text-sm font-medium">{{ t.message }}</span>
    </div>
  </div>
}
